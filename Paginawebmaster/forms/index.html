<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <nav class="headermenu">
            <div>
                <img class="libro" src="./bookmine-removebg-preview.png" alt="librologo">
                <span class="logo">Codigocraft.com</span>
            </div>
            <ul class="menu_list">
                <li><a class="enlaceheader" href="/index.html">Inicio</a></li>
                <li><a class="enlaceheader" href="/Paginawebmaster/fundamentos/box_model/index.html">Box Model</a></li>
                <li><a class="enlaceheader" href="/Paginawebmaster/componentes/index.html">Componentes</a></li>
                <li><a class="enlaceheader" href="/Paginawebmaster/fundamentos/flexbox_2/index.html">Flexbox</a></li>
                <li><a class="enlaceheader" href="/Paginawebmaster/medidas/index.html">Medidas</a></li>
                <li><a class="enlaceheader" href="/Paginawebmaster/fundamentos/propiedades/index.html">Propiedades</a></li>
                <li><a class="enlaceheader" href="/Paginawebmaster/fundamentos/selectores/index.html">Selectores</a></li>
                <li><a class="enlaceheader" href="/Paginawebmaster/forms/index.html">Contacto</a></li>
                <li><a class="btn-sesion" href="/Paginawebmaster/paginaclon/index.html">Iniciar Sesión</a></li>
            </ul>
        </nav>
    </header>

    <div class="contenido">

        <form class="formulario">

            <h1>Contacto</h1>

            <div class="campo">
                <label for="name">Nombre y Apellido</label>
                <input type="text" id="name" name="name" placeholder="Ej: Juan Pérez">
            </div>

            <div class="campo">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" placeholder="Ej: juan@correo.com">
            </div>

            <div class="campo">
                <label for="mensaje">Mensaje</label>
                <textarea id="mensaje" name="mensaje" rows="5" placeholder="Escribe tu mensaje aquí..."></textarea>
            </div>

            <div class="campo">
                <label for="age">Soy mayor de 18 años</label>
                <select id="age" name="age">
                    <option value="">Selecciona una opción</option>
                    <option value="yes">Sí</option>
                    <option value="no">No</option>
                </select>
            </div>

            <div class="campo campo-check">
                <input type="checkbox" id="subscribe" name="subscribe">
                <label for="subscribe">Al enviar, acepto los términos y condiciones</label>
            </div>

            <input class="submit" type="submit" value="Enviar">

        </form>

    </div>

    <footer>Bogotá Institute of Technology (BIT) - 2026 - Todos los derechos reservados ©</footer>

</body>
</html>
